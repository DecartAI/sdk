name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.7.1

      - name: Set node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Verify built package entrypoints
        run: pnpm test:package

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Install React Native compatibility fixture
        run: |
          npm install --prefix tests/fixtures/react-native --ignore-scripts --package-lock=false
          SDK_TARBALL=$(npm pack . --pack-destination /tmp --silent)
          npm install --prefix tests/fixtures/react-native "/tmp/$SDK_TARBALL" --ignore-scripts --package-lock=false --no-save

      - name: Bundle React Native compatibility fixture
        run: |
          mkdir -p tests/fixtures/react-native/.tmp
          npm run --prefix tests/fixtures/react-native bundle:android
          npm run --prefix tests/fixtures/react-native bundle:ios
          if grep -Eq "createFrameTransformPump requires a DOM|deep connectivity probe requires a DOM|Failed to mirror input stream" tests/fixtures/react-native/.tmp/*.jsbundle; then
            echo "React Native bundle unexpectedly contains browser-only realtime code"
            exit 1
          fi

  test-proxy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.7.1

      - name: Set node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  release:
    needs: [test-sdk, test-proxy]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.7.1

      - name: Set node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm build

      - run: pnpm dlx pkg-pr-new publish
